<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="1.png">
    <style>
        :root {
            --bg: #080d14;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.07);
            --text: #f0f4ff;
            --muted: #6b7a99;
            --cyan: #38bdf8;
            --orange: #fb923c;
            --glow-cyan: rgba(56,189,248,0.15);
            --glow-orange: rgba(251,146,60,0.12);
            --modal-bg: #0d1520;
            --modal-border: rgba(255,255,255,0.1);
            --clock-grad-start: #fff;
            --clock-grad-end: #6b7a99;
            --search-focus-bg: rgba(255,255,255,0.06);
            --search-focus-shadow: 0 0 0 3px rgba(56,189,248,0.08), 0 8px 32px rgba(0,0,0,0.3);
            --card-shadow: 0 12px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(56,189,248,0.1);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f0f4fa;
                --surface: rgba(0,0,0,0.04);
                --surface-hover: rgba(0,0,0,0.07);
                --border: rgba(0,0,0,0.09);
                --text: #0d1520;
                --muted: #7a8aaa;
                --cyan: #0284c7;
                --orange: #ea6c1a;
                --glow-cyan: rgba(2,132,199,0.12);
                --glow-orange: rgba(234,108,26,0.10);
                --modal-bg: #ffffff;
                --modal-border: rgba(0,0,0,0.1);
                --clock-grad-start: #0d1520;
                --clock-grad-end: #7a8aaa;
                --search-focus-bg: rgba(255,255,255,0.95);
                --search-focus-shadow: 0 0 0 3px rgba(2,132,199,0.10), 0 8px 32px rgba(0,0,0,0.08);
                --card-shadow: 0 12px 32px rgba(0,0,0,0.08), 0 0 0 1px rgba(2,132,199,0.12);
            }
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            cursor: default;
            transition: background 0.4s ease, color 0.4s ease;
        }
        .bg-blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0; animation: blobIn 1.8s ease forwards; }
        .blob-1 { width: 500px; height: 500px; background: var(--glow-cyan); top: -150px; left: -100px; animation-delay: 0.2s; }
        .blob-2 { width: 400px; height: 400px; background: var(--glow-orange); bottom: -120px; right: -80px; animation-delay: 0.5s; }
        @keyframes blobIn { to { opacity: 1; } }
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.03; pointer-events: none; z-index: 1;
        }
        .container { position: relative; z-index: 2; width: 100%; max-width: 760px; padding: 48px 32px; display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .header { opacity: 0; transform: translateY(20px); animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.1s forwards; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .status-pill { display: inline-flex; align-items: center; gap: 8px; background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.2); border-radius: 999px; padding: 6px 14px; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--cyan); margin-bottom: 20px; }
        .status-dot { width: 6px; height: 6px; background: var(--cyan); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
        .headline { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5.5vw, 4.4rem); font-weight: 800; line-height: 1.0; letter-spacing: -0.02em; white-space: nowrap; }
        .headline .plain { color: var(--text); }
        .headline .grad { background: linear-gradient(90deg, var(--cyan) 0%, var(--orange) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .clock-wrap { opacity: 0; transform: translateY(20px); animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.25s forwards; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .clock-row { display: flex; align-items: baseline; gap: 6px; }
        .clock { font-family: 'Syne', sans-serif; font-size: clamp(5rem, 16vw, 10rem); font-weight: 800; letter-spacing: -0.04em; background: linear-gradient(135deg, var(--clock-grad-start) 40%, var(--clock-grad-end) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
        .clock-seconds { font-family: 'Syne', sans-serif; font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 700; letter-spacing: -0.03em; background: linear-gradient(135deg, var(--cyan) 0%, var(--muted) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; align-self: center; }
        .date-label { margin-top: 8px; font-size: 0.85rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
        .search-wrap { opacity: 0; transform: translateY(20px); animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.38s forwards; width: 100%; }
        .search-inner { position: relative; display: flex; align-items: center; }
        .search-icon { position: absolute; left: 20px; color: var(--muted); font-size: 1rem; pointer-events: none; }
        .search-bar { width: 100%; padding: 16px 20px 16px 48px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.25s, background 0.25s, box-shadow 0.25s; backdrop-filter: blur(10px); }
        .search-bar::placeholder { color: var(--muted); }
        .search-bar:focus { border-color: rgba(56,189,248,0.4); background: var(--search-focus-bg); box-shadow: var(--search-focus-shadow); }
        .links-wrap { opacity: 0; transform: translateY(20px); animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.5s forwards; width: 100%; }
        .links-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .links-label { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
        .add-btn { display: inline-flex; align-items: center; gap: 6px; background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.2); border-radius: 8px; padding: 5px 12px; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.05em; color: var(--cyan); cursor: pointer; transition: background 0.2s, border-color 0.2s; font-family: 'DM Sans', sans-serif; }
        .add-btn:hover { background: rgba(56,189,248,0.14); border-color: rgba(56,189,248,0.35); }
        .links-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .link-card-wrap { position: relative; }
        .link-card-wrap:hover .delete-btn { opacity: 1; }
        .delete-btn { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 50%; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; font-size: 0.65rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s, background 0.2s; z-index: 5; font-family: monospace; }
        .delete-btn:hover { background: rgba(239,68,68,0.35); }
        .link-card { background: var(--surface); border: 1px solid var(--border); padding: 18px 12px; border-radius: 14px; text-decoration: none; color: var(--text); text-align: center; display: block; transition: transform 0.2s cubic-bezier(0.22,1,0.36,1), background 0.2s, border-color 0.2s, box-shadow 0.2s; backdrop-filter: blur(8px); }
        .link-card:hover { transform: translateY(-4px); background: var(--surface-hover); border-color: rgba(56,189,248,0.25); box-shadow: var(--card-shadow); }
        .link-icon { font-size: 1.4rem; display: block; margin-bottom: 8px; }
        .link-name { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.02em; color: var(--muted); transition: color 0.2s; }
        .link-card:hover .link-name { color: var(--text); }
        .add-placeholder { background: rgba(56,189,248,0.03); border: 1px dashed rgba(56,189,248,0.15); padding: 18px 12px; border-radius: 14px; text-align: center; cursor: pointer; transition: background 0.2s, border-color 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; min-height: 82px; }
        .add-placeholder:hover { background: rgba(56,189,248,0.07); border-color: rgba(56,189,248,0.3); }
        .ph-plus { font-size: 1.4rem; color: rgba(56,189,248,0.4); }
        .ph-text { font-size: 0.72rem; color: var(--muted); }
        @media (prefers-color-scheme: light) {
            body::after { opacity: 0.015; }
            .blob-1 { filter: blur(140px); }
            .blob-2 { filter: blur(140px); }
            @keyframes blobIn { to { opacity: 0.5; } }
            .search-bar { background: rgba(255,255,255,0.75); }
            .link-card { background: rgba(255,255,255,0.75); }
            .modal-overlay { background: rgba(0,0,0,0.3); }
        }
        * { transition: background-color 0.35s ease, border-color 0.35s ease, color 0.35s ease, box-shadow 0.35s ease; }
        .blob, .status-dot, .clock, .clock-seconds, .headline .grad { transition: none; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal { background: var(--modal-bg); border: 1px solid var(--modal-border); border-radius: 20px; padding: 32px; width: 100%; max-width: 420px; transform: translateY(24px) scale(0.97); transition: transform 0.3s cubic-bezier(0.22,1,0.36,1); box-shadow: 0 32px 80px rgba(0,0,0,0.7); }
        .modal-overlay.open .modal { transform: translateY(0) scale(1); }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
        .modal-close { width: 28px; height: 28px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s; }
        .modal-close:hover { background: var(--surface-hover); color: var(--text); }
        .modal-field { margin-bottom: 16px; }
        .modal-field label { display: block; font-size: 0.7rem; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
        .modal-input { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        .modal-input::placeholder { color: var(--muted); }
        .modal-input:focus { border-color: rgba(56,189,248,0.4); box-shadow: 0 0 0 3px rgba(56,189,248,0.08); }
        .emoji-picker { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px; }
        .emoji-opt { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s, transform 0.15s; }
        .emoji-opt:hover { background: var(--surface-hover); transform: scale(1.12); }
        .emoji-opt.selected { border-color: rgba(56,189,248,0.5); background: rgba(56,189,248,0.1); }
        .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
        .btn-cancel { flex: 1; padding: 11px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; cursor: pointer; transition: background 0.2s, color 0.2s; }
        .btn-cancel:hover { background: var(--surface-hover); color: var(--text); }
        .btn-save { flex: 2; padding: 11px; border-radius: 10px; border: none; background: linear-gradient(90deg, var(--cyan), var(--orange)); color: #080d14; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
        .btn-save:hover { opacity: 0.9; }
        .btn-save:active { transform: scale(0.98); }
        .field-error { font-size: 0.73rem; color: #f87171; margin-top: 5px; display: none; }
        .field-error.show { display: block; }
    </style>
</head>
<body>

<div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
</div>

<div class="container">
    <div class="header">
        <div class="status-pill"><span class="status-dot"></span> Available &amp; Building</div>
        <h1 class="headline"><span class="plain">Welcome back </span><span class="grad">Ayoub</span></h1>
    </div>

    <div class="clock-wrap">
        <div class="clock-row">
            <div class="clock" id="clock">00:00</div>
            <div class="clock-seconds" id="clock-seconds">00</div>
        </div>
        <div class="date-label" id="date-label">—</div>
    </div>

    <div class="search-wrap">
        <form action="https://google.com/search" method="get">
            <div class="search-inner">
                <span class="search-icon">⌕</span>
                <input type="text" name="q" class="search-bar" placeholder="Search the web..." autofocus>
            </div>
        </form>
    </div>

    <div class="links-wrap">
        <div class="links-header">
            <p class="links-label">Quick Access</p>
            <button class="add-btn" onclick="openModal()">+ Add link</button>
        </div>
        <div class="links-grid" id="links-grid"></div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <div class="modal-title">
            <span>New Quick Link</span>
            <button class="modal-close" onclick="closeModal()">&#x2715;</button>
        </div>
        <div class="modal-field">
            <label>Name</label>
            <input type="text" class="modal-input" id="inp-name" placeholder="e.g. GitHub" maxlength="20">
            <p class="field-error" id="err-name">Please enter a name.</p>
        </div>
        <div class="modal-field">
            <label>URL</label>
            <input type="text" class="modal-input" id="inp-url" placeholder="https://...">
            <p class="field-error" id="err-url">Please enter a valid URL.</p>
        </div>
        <div class="modal-field">
            <label>Pick an icon</label>
            <div class="emoji-picker" id="emoji-picker"></div>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveLink()">Add Link &#x2192;</button>
        </div>
    </div>
</div>

<script>
    const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function tick() {
        const n = new Date();
        document.getElementById('clock').textContent = String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
        document.getElementById('clock-seconds').textContent = String(n.getSeconds()).padStart(2,'0');
        document.getElementById('date-label').textContent = DAYS[n.getDay()] + ', ' + MONTHS[n.getMonth()] + ' ' + n.getDate();
    }
    setInterval(tick, 1000); tick();

    const STORAGE_KEY = 'ayoub_links_v2';
    const DEFAULTS = [
        { name:'GitHub',       url:'https://github.com',           icon:'&#x1F4BB;' },
        { name:'YouTube',      url:'https://youtube.com',          icon:'&#x1F4FA;' },
        { name:'Takiacademy', url:'https://app.takiacademy.com/', icon:'&#x1F393;' },
        { name:'Instagram',    url:'https://instagram.com/',       icon:'&#x1F4F8;' },
        { name:'Gmail',        url:'https://gmail.com',            icon:'&#x2709;&#xFE0F;' },
    ];

    function loadLinks() {
        try { var s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; }
        catch(e) { return null; }
    }
    function getLinks() {
        var l = loadLinks(); return l ? l : JSON.parse(JSON.stringify(DEFAULTS));
    }
    function persistLinks(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

    function renderGrid() {
        var grid = document.getElementById('links-grid');
        var links = getLinks();
        grid.innerHTML = '';
        links.forEach(function(lk, i) {
            var wrap = document.createElement('div');
            wrap.className = 'link-card-wrap';
            var a = document.createElement('a');
            a.href = lk.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
            a.className = 'link-card';
            var icon = document.createElement('span');
            icon.className = 'link-icon'; icon.textContent = lk.icon;
            var name = document.createElement('span');
            name.className = 'link-name'; name.textContent = lk.name;
            a.appendChild(icon); a.appendChild(name);
            var del = document.createElement('button');
            del.className = 'delete-btn'; del.textContent = '\u2715'; del.title = 'Remove';
            del.setAttribute('data-idx', i);
            del.addEventListener('click', function(e) {
                e.preventDefault(); e.stopPropagation();
                removeLink(parseInt(this.getAttribute('data-idx')));
            });
            wrap.appendChild(a); wrap.appendChild(del);
            grid.appendChild(wrap);
        });
        var ph = document.createElement('div');
        ph.className = 'add-placeholder';
        var ps = document.createElement('span'); ps.className = 'ph-plus'; ps.textContent = '+';
        var pt = document.createElement('span'); pt.className = 'ph-text'; pt.textContent = 'Add link';
        ph.appendChild(ps); ph.appendChild(pt);
        ph.addEventListener('click', openModal);
        grid.appendChild(ph);
    }

    function removeLink(i) {
        var links = getLinks(); links.splice(i,1); persistLinks(links); renderGrid();
    }

    renderGrid();

    var EMOJIS = ['💻','📺','✉️','📸','🎓','🎮','📁','🔗','🎵','📰','🛒','💬','📊','🔒','⚡','🌐','🎨','🤖','🏠','📌','🚀','🎯','🧩','🔥'];
    var chosenEmoji = EMOJIS[0];

    function buildPicker() {
        var picker = document.getElementById('emoji-picker');
        picker.innerHTML = '';
        EMOJIS.forEach(function(em) {
            var btn = document.createElement('button');
            btn.className = 'emoji-opt' + (em === chosenEmoji ? ' selected' : '');
            btn.textContent = em; btn.type = 'button';
            btn.addEventListener('click', function() {
                chosenEmoji = em;
                document.querySelectorAll('.emoji-opt').forEach(function(b){ b.classList.remove('selected'); });
                btn.classList.add('selected');
            });
            picker.appendChild(btn);
        });
    }

    function openModal() {
        chosenEmoji = EMOJIS[0];
        document.getElementById('inp-name').value = '';
        document.getElementById('inp-url').value = '';
        document.getElementById('err-name').classList.remove('show');
        document.getElementById('err-url').classList.remove('show');
        buildPicker();
        document.getElementById('modal-overlay').classList.add('open');
        setTimeout(function(){ document.getElementById('inp-name').focus(); }, 120);
    }

    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

    document.getElementById('modal-overlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    function isValidUrl(s) {
        try { var u = new URL(s); return u.protocol === 'http:' || u.protocol === 'https:'; } catch(e){ return false; }
    }

    function saveLink() {
        var name = document.getElementById('inp-name').value.trim();
        var url = document.getElementById('inp-url').value.trim();
        document.getElementById('err-name').classList.remove('show');
        document.getElementById('err-url').classList.remove('show');
        var valid = true;
        if (!name) { document.getElementById('err-name').classList.add('show'); valid = false; }
        if (url && !url.startsWith('http')) url = 'https://' + url;
        if (!isValidUrl(url)) { document.getElementById('err-url').classList.add('show'); valid = false; }
        if (!valid) return;
        var links = getLinks();
        links.push({ name: name, url: url, icon: chosenEmoji });
        persistLinks(links); renderGrid(); closeModal();
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) saveLink();
    });
</script>
</body>
</html>
